app_name: Strappy
tag_prefix: v

version:
  source: source/macOS/Info.plist
  keys:
    - CFBundleShortVersionString
    - CFBundleVersion
  plists:
    - source/macOS/Info.plist
    - source/iOS/Info.plist

release:
  commit_message: "Version {version}"

targets:
  - name: macOS
    workdir: source/macOS
    build:
      - make clean
      - make release
    artifact: source/macOS/build-release/Strappy.zip
    asset_name: Strappy-{version}-macOS.zip

  - name: iOS
    workdir: source/iOS
    build:
      - make clean
      - make release
    artifact: source/iOS/build-release/Strappy.ipa
    asset_name: Strappy-{version}-iOS.ipa
